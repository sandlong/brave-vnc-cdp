services:
  chromium-selkies-cdp:
    build: .
    container_name: chromium-selkies-cdp
    ports:
      - "3001:3001"   # Chromium web UI (HTTPS)
      - "9222:9222"   # CDP, only live when ENABLE_CDP=true
    environment:
      TZ: Asia/Singapore
      CUSTOM_USER: change-me
      PASSWORD: change-me
      ENABLE_CDP: "true"
      CDP_PORT: "9222"
      # CHROME_CLI: "--disable-gpu"
      # SELKIES_MANUAL_WIDTH: "1440"
      # SELKIES_MANUAL_HEIGHT: "900"
    volumes:
      - chromium-config:/config
    restart: unless-stopped

volumes:
  chromium-config:
