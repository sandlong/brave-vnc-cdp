name: docker-publish

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  schedule:
    - cron: '17 2 * * *'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve upstream linuxserver/chromium digest tag
        id: upstream
        shell: bash
        run: |
          set -euo pipefail
          raw="$(docker buildx imagetools inspect lscr.io/linuxserver/chromium:latest --raw)"
          digest="$(printf '%s' "$raw" | sha256sum | awk '{print $1}')"
          short="${digest:0:12}"
          echo "digest=$digest" >> "$GITHUB_OUTPUT"
          echo "tag=upstream-$short" >> "$GITHUB_OUTPUT"

      - name: Decide whether build is needed
        id: gate
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" != "schedule" ]]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if docker manifest inspect ghcr.io/${{ github.repository }}:${{ steps.upstream.outputs.tag }} >/dev/null 2>&1; then
            echo "Image tag ghcr.io/${{ github.repository }}:${{ steps.upstream.outputs.tag }} already exists, skipping scheduled rebuild."
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          DOCKER_CLI_EXPERIMENTAL: enabled

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        if: steps.gate.outputs.should_build == 'true'
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=${{ steps.upstream.outputs.tag }}
          labels: |
            org.opencontainers.image.title=chromium-selkies-cdp
            org.opencontainers.image.description=Thin downstream of linuxserver/chromium with optional CDP forwarding
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.base.name=lscr.io/linuxserver/chromium:latest
            org.opencontainers.image.version=${{ steps.upstream.outputs.tag }}

      - name: Build and push
        uses: docker/build-push-action@v6
        if: steps.gate.outputs.should_build == 'true'
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Skip note
        if: steps.gate.outputs.should_build != 'true'
        run: echo "No upstream linuxserver/chromium change detected, scheduled publish skipped."
